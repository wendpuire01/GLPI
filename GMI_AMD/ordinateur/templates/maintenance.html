{%load static %}


<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>GMI_AMD</title>

    <!-- Custom fonts for this template-->
    <link  rel="stylesheet" type="text/css" href="{ %static  'vendor/fontawesome-free/css/all.min.css'%}">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static '/bootstrap.min.css'%}">
    <!-- Custom styles for this template-->
    <link  rel="stylesheet" href="{% static 'css/sb-admin-2.min.css'%}">
   
</head>

<body id="page-top" class="navbar-fixed">
        <div class="container-fluid">

            <!-- Page Heading -->
            <div class="d-sm-flex align-items-center justify-content-between mb-4">
                
            </div>



        </div>
        <div class="container mt-5 col-8 rounded shadow">
            <h2 style="background-color: #4e73df; color: white; text-align: center;" >Expression de besion en maintenance (AMD-IRMA)</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="ram" class="form-label">Nom et Prénom</label>
                    <input type="text" class="form-control" id="utilisateur" name="utilisateur" placeholder="Veuillez renseigner votre nom et prénom">
                </div>
                <div class="mb-3">
                    <label for="marque" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date" placeholder="Insérez la date de votre demande">
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Vous disposez d'un ordinateur de AMD</label>
                    <select class="form-control" id="exampleSelect" name="departement">
                        <option>OUI </option>
                        <option>NON J'UTILISE MA MACHINE PERSONNEL</option>
                        
                      </select>
                </div>

                <div class="mb-3">
                    <label for="ram" class="form-label">Marque</label>
                    <input type="text" class="form-control" id="marque" name="marque" placeholder="Veuillez entre la marque de votre machine">
                </div>

                <div class="mb-3">
                    <label for="disque" class="form-label">Numero de serie</label>
                    <input type="text" class="form-control" id="seri" rows="3" name="seri" placeholder="Le numero de serie de votre machine">
                </div>

                <div class="mb-3">
                    <label for="Processeur" class="form-label">Quel problem rencontrez vous?</label>
                    <input type="text" class="form-control" id="prbl" name="prbl" rows="3" placeholder="veuillez renseignez la panne">
                </div>
                <div class="mb-3">
                    <label for="Processeur" class="form-label">Combien de fois aviez vous signaler ce problem?</label>
                    <input type="number" class="form-control" id="nbr" name="nbr" rows="3" placeholder="veuillez renseignez le nombre de fois que vous aviez signale">
                </div>
                

                <div class="mb-3">
                    <label for="seri" class="form-label">Numero de Téléphone(Whatsapp)</label>
                    <input type="number" class="form-control" id="telephone" rows="3" name="telephone" placeholder="Numero de telephone">
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Département</label>
                    <select class="form-control" id="exampleSelect" name="departement">
                        <option>Direction</option>
                        <option>Direction Operationnel</option>
                        <option>Departement finance et compta</option>
                        <option>Departement SIDIA</option>
                        <option>Departement commercial</option>
                      </select>
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Etat actuelle de votre machine</label>
                    <select class="form-control" id="exampleSelect" name="statut">
                        <option>Fonctionnel partiellement</option>
                        <option>Non Fonctionnel</option>
                        
                      </select>
                </div>
            
                <button type="submit" class="btn btn-primary">Enregistre</button>
            </form>

        
        </div>

</body>

</html>
