<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inventaire des Ordinateurs</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 {
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Inventaire des Ordinateurs</h1>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th>Numéro</th>
                    <th>Marque</th>
                    <th>Numéro de série</th>
                    <th>Taille de l'écran</th>
                    <th>Date d'acquisition</th>
                </tr>
            </thead>
            <tbody>
                {% for ordinateur in ordinateurs %}
                <tr>
                    <td>{{ ordinateur.id }}</td>
                    <td>{{ ordinateur.marque }}</td>
                    <td>{{ ordinateur.numero_serie }}</td>
                    <td>{{ ordinateur.ecran }}</td>
                    <td>{{ ordinateur.dte_acquisition }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
